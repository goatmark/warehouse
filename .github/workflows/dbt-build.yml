name: dbt build (warehouse)

# Replaces the personal dbt Cloud job `my_new_project`.
# Runs dbt-core + dbt-bigquery on GitHub Actions, mirroring the pattern used by
# goatmark/bibletimes-analytics/.github/workflows/daily.yml (dbt job).
#
# Builds the personal reporting layer into
#   data-warehouse-475122.data_warehouse_475122_warehouse
# (same target dataset dbt Cloud writes to today).

on:
  # Scheduled refresh. Cron only fires on the repo's default branch, so this
  # stays dormant until the migration branch is merged.
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC daily (after upstream BigQuery loads land)
  # Manual run from the Actions tab.
  workflow_dispatch:
  # Event-based trigger: fire from upstream loaders (e.g. mercury-receipts /
  # github-sync) once their BigQuery loads complete.
  #   gh api repos/goatmark/warehouse/dispatches -f event_type=dbt-build
  repository_dispatch:
    types: [dbt-build]

concurrency:
  group: dbt-build
  cancel-in-progress: false

jobs:
  dbt:
    name: dbt build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Write GCP credentials
        env:
          GCP_DWH_CREDENTIALS_JSON: ${{ secrets.GCP_DWH_CREDENTIALS_JSON }}
        run: echo "$GCP_DWH_CREDENTIALS_JSON" > /tmp/gcp_dwh_credentials.json

      - name: Write dbt profile
        run: |
          cat > profiles.yml <<'YAML'
          default:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: data-warehouse-475122
                dataset: data_warehouse_475122_warehouse
                keyfile: /tmp/gcp_dwh_credentials.json
                location: US
                threads: 4
                priority: interactive
                job_execution_timeout_seconds: 600
                job_retries: 1
          YAML

      - name: Run dbt build
        run: dbt build --profiles-dir . --project-dir .
