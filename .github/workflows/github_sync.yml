name: GitHub -> BigQuery Sync

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-cloud-bigquery google-auth

      - name: Write GCP credentials
        run: echo "$GCP_SA_JSON" | base64 -d > /tmp/gcp_sa.json
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}

      - name: Run GitHub sync
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GCP_SA_PATH: /tmp/gcp_sa.json
        run: python scripts/github_sync.py

      # dbt trigger removed — dbt is now orchestrated from goatmark/mercury-receipts
      # dbt-trigger.yml fires at 4:30am and 6:30pm CT after all BQ loads complete
