
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'my_new_project'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"

# 3-way schema routing (see macros/generate_schema_name.sql).
# Default target schema is dwh_reporting; the models below are pinned to
# dedicated finance datasets. Everything else lands in dwh_reporting.
models:
  my_new_project:
    +schema: dwh_reporting
    # Business finance facts -> dwh_finance_business
    fct_mercury_transactions:
      +schema: dwh_finance_business
    fct_mercury_p_and_l:
      +schema: dwh_finance_business
    fct_mercury_missing_receipts:
      +schema: dwh_finance_business
    fct_finance_transactions:
      +schema: dwh_finance_business
    fct_finance_p_and_l:
      +schema: dwh_finance_business
    # Personal card/merchant cleaning models -> dwh_finance_personal
    cln_card_transactions:
      +schema: dwh_finance_personal
    cln_merchants:
      +schema: dwh_finance_personal