version: 2

# Target-state raw layer: models read from the new data_* datasets.
# The former single `warehouse` source (which fed BOTH life tables and
# personal-finance tables) is split into `life` (-> data_life) and
# `finance_personal` (-> data_finance_personal). Website tables move to
# `website` (-> data_website). Business finance -> data_finance_business.
#
# Source freshness (Tiller / Supabase sync safety net)
# ----------------------------------------------------
# Ingestion runs every 2h and stamps `_airbyte_extracted_at` (full reload,
# so max(_airbyte_extracted_at) == last successful sync time for the table).
# mercury_transactions has no `_airbyte_extracted_at`; it uses its own
# purpose-built `loaded_at` TIMESTAMP instead.
# freshness thresholds: warn after 12h (6 missed 2h cycles), error after 30h.
# NOT added to intentionally-static lookup tables (categories, subcategories)
# nor to tables that are static-in-practice / not currently resynced
# (exercise_muscles, exercise_loads, blog_posts) — those would false-alarm.
sources:
  - name: life
    database: data-warehouse-475122
    schema: data_life
    tables:
      - name: exercises
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      # exercise_log / recipe_log / shopping_log / weights: rolling activity logs
      - name: exercise_log
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      # exercise_muscles: static-in-practice (last synced 2026-04-29) — no freshness
      - name: exercise_muscles
      # exercise_loads: static-in-practice (last synced 2026-04-29) — no freshness
      - name: exercise_loads
      - name: recipe_log
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: recipes
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: shopping_log
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: weights
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}

  - name: finance_personal
    database: data-warehouse-475122
    schema: data_finance_personal
    tables:
      # card_transactions: the Tiller -> Sheet -> Supabase -> BQ path.
      # This is the highest-priority freshness check (silent stall risk).
      - name: card_transactions
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: merchants
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: transaction_merchant_maps
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      # subcategories / categories: intentionally-static lookups — no freshness
      - name: subcategories
      - name: categories

  - name: website
    database: data-warehouse-475122
    schema: data_website
    tables:
      - name: notion_embeddings
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      # blog_posts: static-in-practice (last synced 2026-02-06) — no freshness
      - name: blog_posts
      - name: email_settings
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: priorities
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: users
        config:
          loaded_at_field: _airbyte_extracted_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}

  - name: finance
    database: data-warehouse-475122
    schema: data_finance_business
    tables:
      # mercury_transactions has no _airbyte_extracted_at; use its own load stamp.
      - name: mercury_transactions
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 30, period: hour}
      - name: notion_transactions
