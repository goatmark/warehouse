version: 2

# Target-state raw layer: models read from the new data_* datasets.
# The former single `warehouse` source (which fed BOTH life tables and
# personal-finance tables) is split into `life` (-> data_life) and
# `finance_personal` (-> data_finance_personal). Website tables move to
# `website` (-> data_website). Business finance -> data_finance_business.
sources:
  - name: life
    database: data-warehouse-475122
    schema: data_life
    tables:
      - name: exercises
      - name: exercise_log
      - name: exercise_muscles
      - name: exercise_loads
      - name: recipe_log
      - name: recipes
      - name: shopping_log
      - name: weights

  - name: finance_personal
    database: data-warehouse-475122
    schema: data_finance_personal
    tables:
      - name: card_transactions
      - name: merchants
      - name: transaction_merchant_maps
      - name: subcategories
      - name: categories

  - name: website
    database: data-warehouse-475122
    schema: data_website
    tables:
      - name: notion_embeddings
      - name: blog_posts
      - name: email_settings
      - name: priorities
      - name: users

  - name: finance
    database: data-warehouse-475122
    schema: data_finance_business
    tables:
      - name: mercury_transactions
      - name: notion_transactions
